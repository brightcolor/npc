name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build artifacts
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE} -X main.repoOwner=${GITHUB_REPOSITORY_OWNER} -X main.repoName=${GITHUB_REPOSITORY#*/}"
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o npc-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o npc-linux-arm64 .
          ./npc-linux-amd64 completion bash > npc.bash
          ./npc-linux-amd64 completion zsh > npc.zsh
          ./npc-linux-amd64 completion fish > npc.fish
          sha256sum npc-linux-amd64 npc-linux-arm64 npc.bash npc.zsh npc.fish > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            npc-linux-amd64
            npc-linux-arm64
            npc.bash
            npc.zsh
            npc.fish
            SHA256SUMS
